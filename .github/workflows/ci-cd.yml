name: TurboVets CI-CD

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: tv-devops-app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME ./app

      - name: Tag Docker Image
        run: |
          docker tag $IMAGE_NAME:latest ${{ secrets.ECR_URI }}:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.ECR_URI }}:latest

      - name: Install IaC Dependencies
        working-directory: ./iac
        run: npm install

      - name: Generate CDKTF Providers
        working-directory: ./iac
        run: npx cdktf get

      - name: Deploy Infrastructure
        working-directory: ./iac
        env:
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_image_tag: latest
          TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}
        run: |
          npx cdktf deploy --auto-approve
